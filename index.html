<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Học HSK</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

/* sidebar */

.sidebar{
width:200px;
background:#2c3e50;
color:white;
padding:10px;
overflow:auto;
}

.sidebar div{
padding:10px;
cursor:pointer;
}

.sidebar div:hover{
background:#34495e;
}

/* content */

.content{
flex:1;
padding:20px;
overflow:auto;
}

/* tabs */

.tabs button{
margin-right:10px;
padding:8px 15px;
cursor:pointer;
}

.tab{
display:none;
margin-top:20px;
}

.tab.active{
display:block;
}

img{
max-width:700px;
display:block;
margin-bottom:10px;
}

textarea{
width:100%;
height:150px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div onclick="loadLesson(1)">Bài 1</div>
<div onclick="loadLesson(2)">Bài 2</div>
<div onclick="loadLesson(3)">Bài 3</div>
<div onclick="loadLesson(4)">Bài 4</div>
<div onclick="loadLesson(5)">Bài 5</div>
<div onclick="loadLesson(6)">Bài 6</div>
<div onclick="loadLesson(7)">Bài 7</div>
<div onclick="loadLesson(8)">Bài 8</div>
<div onclick="loadLesson(9)">Bài 9</div>
<div onclick="loadLesson(10)">Bài 10</div>
<div onclick="loadLesson(11)">Bài 11</div>
<div onclick="loadLesson(12)">Bài 12</div>
<div onclick="loadLesson(13)">Bài 13</div>
<div onclick="loadLesson(14)">Bài 14</div>
<div onclick="loadLesson(15)">Bài 15</div>

</div>


<!-- CONTENT -->

<div class="content">

<h1 id="lessonTitle">Bài 1</h1>

<div class="tabs">

<button onclick="showTab('giaotrinh')">Giáo trình</button>
<button onclick="showTab('baitap')">Bài tập</button>
<button onclick="showTab('tapviet')">Tập viết</button>
<button onclick="showTab('audio')">Audio</button>
<button onclick="showTab('ghichu')">Ghi chú</button>

</div>


<!-- giáo trình -->

<div id="giaotrinh" class="tab active">

<img src="images/b1_page1.jpg">

<audio controls src="audio/b1_1.mp3"></audio>

<img src="images/b1_page2.jpg">

<audio controls src="audio/b1_2.mp3"></audio>

</div>


<!-- bài tập -->

<div id="baitap" class="tab">

<img src="images/b1_bt1.jpg">

<audio controls src="audio/b1_bt1.mp3"></audio>

</div>


<!-- tập viết -->

<div id="tapviet" class="tab">

<img src="images/b1_viet1.jpg">

</div>


<!-- audio -->

<div id="audio" class="tab">

<audio controls src="audio/b1_dialog1.mp3"></audio><br><br>

<audio controls src="audio/b1_dialog2.mp3"></audio><br><br>

<audio controls src="audio/b1_ex1.mp3"></audio>

</div>


<!-- ghi chú -->

<div id="ghichu" class="tab">

<textarea id="note" style="width:100%;height:1200px;"></textarea>

</div>


</div>


<script>

let currentLesson=1

function loadLesson(n){

currentLesson=n

document.getElementById("lessonTitle").innerText="Bài "+n

loadNote()

}

function showTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* ghi chú tự lưu */

const note=document.getElementById("note")

function loadNote(){

note.value=localStorage.getItem("note"+currentLesson)||""

}

note.addEventListener("input",function(){

localStorage.setItem("note"+currentLesson,note.value)

})

loadNote()

</script>

</body>
</html>
